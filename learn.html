      <p>Welcome to Python! The first program every programmer writes prints "Hello, World!" to the screen. Python makes this incredibly simple — just one line of code.</p>
      <p>The <code>print()</code> function is built into Python. It outputs whatever you put between the parentheses to the console. You can print text strings, numbers, variables, or the result of an expression.</p>

      <p>You can also create your own modules. Any <code>.py</code> file is a module. Put functions and classes in a file, and import it from another file.</p>
      <p>Some of the most useful standard library modules: <code>math</code>, <code>random</code>, <code>datetime</code>, <code>json</code>, <code>os</code>, <code>sys</code>, <code>collections</code>, <code>itertools</code>.</p>
      <div class="tip"><strong>Best practice:</strong> Put all imports at the top of your file, grouped in order: standard library, third-party, then your own modules.</div>
    `
  },
  {
    title: "Decorators", level: "advanced", mins: 10,
    code: `def timer(func):
    def wrapper():
        print("Starting...")
        result = func()
        print("Done!")
        return result
    return wrapper

@timer
def say_hello():
    print("Hello, Uscrovis!")

say_hello()`,
    content: `
      <p><strong>Decorators</strong> are a powerful feature that allows you to modify or extend the behavior of functions or classes without changing their source code. They are widely used in Python frameworks and libraries.</p>
      <p>A decorator is essentially a function that takes another function as an argument, wraps some behavior around it, and returns the modified function. The <code>@decorator</code> syntax is syntactic sugar for <code>my_func = decorator(my_func)</code>.</p>
      <p>Common uses of decorators include:</p>
      <ul>
        <li><strong>Logging</strong> — automatically log when a function is called</li>
        <li><strong>Timing</strong> — measure how long a function takes to execute</li>
        <li><strong>Authentication</strong> — check if a user is logged in before executing</li>
        <li><strong>Caching</strong> — store and reuse results of expensive function calls</li>
      </ul>
      <p>The <code>functools.wraps</code> decorator is often used when writing decorators to preserve the original function's metadata (name, docstring).</p>
      <div class="tip"><strong>Note:</strong> You can stack multiple decorators on one function. They apply from bottom to top: the closest decorator to the function runs first.</div>
    `
  },
  {
    title: "Generators & Yield", level: "advanced", mins: 9,
    code: `def count_up_to(n):
    i = 1
    while i <= n:
        yield i
        i += 1

for num in count_up_to(5):
    print(num)

# Generator expression
squares = (x**2 for x in range(5))
print(list(squares))`,
    content: `
      <p><strong>Generators</strong> are functions that produce a sequence of values lazily — they yield one value at a time instead of computing and storing all values at once. This makes them exceptionally memory-efficient for large datasets.</p>
      <p>Unlike regular functions that use <code>return</code> and terminate, a generator function uses the <code>yield</code> keyword. When called, it returns a generator object without executing the function. Each time you request the next value (via <code>next()</code> or a for loop), the function runs until it hits <code>yield</code>, produces the value, and pauses — saving its state for the next call.</p>
      <p><strong>Generator expressions</strong> are the lazy equivalent of list comprehensions. They use parentheses instead of square brackets:</p>
      <p><code>squares = (x**2 for x in range(1000000))</code></p>
      <p>This creates a generator that produces squares on demand, using almost no memory — unlike a list comprehension which would create a million-element list.</p>
      <p>Generators are perfect for: reading large files line by line, infinite sequences, data streams, and pipeline processing.</p>
      <div class="tip"><strong>Key insight:</strong> A generator remembers its state between yields. This is different from a regular function which starts fresh on every call.</div>
    `
  }
];

// ===== STATE =====
let currentLesson = 0;
const LEVEL_ORDER = ['beginner', 'intermediate', 'advanced'];
const LEVEL_LABELS = { beginner: 'Beginner', intermediate: 'Intermediate', advanced: 'Advanced' };
const LEVEL_BADGE_CLASS = { beginner: 'beginner', intermediate: 'int', advanced: 'adv' };
const LEVEL_META_CLASS = { beginner: 'beginner', intermediate: 'intermediate', advanced: 'advanced' };

function getLevelIndex(l) { return LEVEL_ORDER.indexOf(l); }

// ===== SIDEBAR =====
function renderSidebar() {
  const sidebar = document.getElementById('learnSidebar');
  const total = LESSONS.length;
  const completed = LESSONS.filter((_, i) => localStorage.getItem('lesson_done_' + i) === '1').length;
  const pct = Math.round((completed / total) * 100);

  let sectionHtml = '';
  let currentLevel = '';
  LESSONS.forEach((l, i) => {
    const lvl = l.level;
    if (lvl !== currentLevel) {
      currentLevel = lvl;
      sectionHtml += '<div class="sidebar-section-title">' + LEVEL_LABELS[lvl] + '</div>';
    }
    const isActive = i === currentLesson;
    const isDone = localStorage.getItem('lesson_done_' + i) === '1';
    const cls = 'learn-lesson' + (isActive ? ' active' : '') + (isDone ? ' completed' : '');
    const badge = '<span class="lesson-badge ' + LEVEL_BADGE_CLASS[lvl] + '">' + l.mins + 'm</span>';
    sectionHtml += '<div class="' + cls + '" data-i="' + i + '">' +
      '<div class="lesson-status"><div class="dot"></div></div>' +
      '<span class="lesson-label">' + l.title + '</span>' +
      badge +
      '</div>';
  });

  sidebar.innerHTML =
    '<div class="sidebar-header">' +
      '<h1 style="font-size:13px;color:#e6edf3;font-weight:600;margin-bottom:10px;letter-spacing:0">Python Course</h1>' +
      '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="progress-text"><span>' + completed + ' of ' + total + ' completed</span><span>' + pct + '%</span></div>' +
    '</div>' +
    '<div class="sidebar-section">' + sectionHtml + '</div>';

  sidebar.querySelectorAll('.learn-lesson').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.i);
      if (i !== currentLesson) {
        currentLesson = i;
        renderSidebar();
        showLesson(currentLesson);
        localStorage.setItem('last_lesson', i);
        scrollSidebarToActive();
      }
    });
  });
  scrollSidebarToActive();
}

function scrollSidebarToActive() {
  setTimeout(() => {
    const active = document.querySelector('.learn-lesson.active');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }, 50);
}

// ===== LESSON CONTENT =====
function showLesson(i) {
  const l = LESSONS[i];
  const body = document.getElementById('learnBody');
  const num = (i + 1).toString().padStart(2, '0');
  const levelLabel = LEVEL_LABELS[l.level];
  const metaCls = LEVEL_META_CLASS[l.level];

  const prevDisabled = i === 0;
  const nextDisabled = i === LESSONS.length - 1;

  body.innerHTML =
    '<div class="lesson-header">' +
      '<div class="lesson-number">Lesson ' + num + '</div>' +
      '<h1 class="lesson-title">' + l.title + '</h1>' +
      '<div class="lesson-meta">' +
        '<span class="badge ' + metaCls + '">' + levelLabel + '</span>' +
        '<span class="time">&#9201; ' + l.mins + ' min</span>' +
      '</div>' +
    '</div>' +
    '<div class="lesson-body">' + l.content + '</div>' +
    '<div class="code-wrap">' +
      '<div class="code-header">' +
        '<span class="code-lang">Python</span>' +
        '<button class="btn-copy" id="copyBtn" onclick="copyCode(' + i + ')">Copy</button>' +
      '</div>' +
      '<div class="code-block" id="codeBlock">' + l.code + '</div>' +
    '</div>' +
    '<button class="btn btn-run" onclick="openInEditor(' + i + ')">&#9654; Open in Editor & Run</button>' +
    '<div class="lesson-nav">' +
      '<button class="nav-btn" onclick="goLesson(' + (i - 1) + ')"' + (prevDisabled ? ' disabled' : '') + '>&larr; Previous</button>' +
      '<span class="nav-center">' + (i + 1) + ' / ' + LESSONS.length + '</span>' +
      '<button class="nav-btn" onclick="goLesson(' + (i + 1) + ')"' + (nextDisabled ? ' disabled' : '') + '>Next &rarr;</button>' +
    '</div>' +
    '<div class="ad-section"><div class="ad-label">\u2014 Ad \u2014</div><div class="ad-inner"><iframe data-aa="2445996" src="//ad.a-ads.com/2445996/?size=320x100" style="border:0;padding:0;width:320px;height:100px;overflow:hidden;display:block;margin:auto"></iframe></div></div>';

  // Reset reading progress
  document.getElementById('readingProgress').style.width = '0%';
}

function goLesson(i) {
  if (i < 0 || i >= LESSONS.length) return;
  currentLesson = i;
  localStorage.setItem('last_lesson', i);
  renderSidebar();
  showLesson(currentLesson);
  // Scroll content to top
  document.getElementById('learnContent').scrollTop = 0;
}

function openInEditor(i) {
  window.location.href = '/?code=' + i;
}

function copyCode(i) {
  const code = LESSONS[i].code;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }
}

// ===== KEYBOARD NAV =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { goLesson(currentLesson - 1); }
  if (e.key === 'ArrowRight') { goLesson(currentLesson + 1); }
});

// ===== READING PROGRESS =====
const contentEl = document.getElementById('learnContent');
contentEl.addEventListener('scroll', () => {
  const scrollTop = contentEl.scrollTop;
  const scrollHeight = contentEl.scrollHeight - contentEl.clientHeight;
  if (scrollHeight > 0) {
    const pct = Math.min((scrollTop / scrollHeight) * 100, 100);
    document.getElementById('readingProgress').style.width = pct + '%';
  }
});

// ===== KBD HINT (hide after first interaction) =====
setTimeout(() => {
  const hint = document.getElementById('kbdHint');
  hint.classList.add('show');
  setTimeout(() => hint.classList.remove('show'), 5000);
}, 2000);
document.addEventListener('keydown', () => {
  document.getElementById('kbdHint').classList.remove('show');
}, { once: true });

// ===== THEME TOGGLE =====
const storedTheme = localStorage.getItem('theme');
if (storedTheme === 'light') { document.body.classList.add('light-mode'); }
document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
  localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
});

// ===== INIT =====
currentLesson = parseInt(localStorage.getItem('last_lesson')) || 0;
renderSidebar();
showLesson(currentLesson);
scrollSidebarToActive();
</script>
</body>
</html>
